<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BÓNG ĐÁ PHONG TRÀO PHÚ THỌ</title>

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#081b2e;
    color:white;
}

/* ẢNH AUTO */
img{
    max-width:100%;
    height:auto;
    display:block;
}

/* HEADER */
header{
    position:sticky;
    top:0;
    z-index:999;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 5%;
    background:#06101b;
    flex-wrap:wrap;
    gap:10px;
}

/* LOGO */
.logo img{
    height:50px;
}

/* MENU */
nav{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    justify-content:center;
}

nav a{
    text-decoration:none;
    color:white;
    font-size:clamp(14px, 1.2vw, 18px);
}

/* BUTTON */
.btn-buy{
    background:#ff5a1f;
    padding:10px 20px;
    border-radius:25px;
}

/* BANNER */
.banner{
    display:flex;
    flex-wrap:wrap;
    align-items:center;
    justify-content:center;
    padding:40px 5%;
    gap:40px;
}

/* TEXT */
.match-info{
    max-width:500px;
}

/* TITLE */
.match-info h1{
    font-size:clamp(26px,5vw,48px);
    margin:20px 0;
}

/* BUTTON */
.btn-watch{
    display:inline-block;
    margin-top:10px;
    background:#ff5a1f;
    padding:12px 25px;
    border-radius:25px;
    text-decoration:none;
    color:white;
}

/* VIDEO BOX */
.video-box{
    position:relative;
    width:100%;
    max-width:700px;
}

.video-box img{
    width:100%;
    border-radius:12px;
}

/* BADGE */
.badge{
    position:absolute;
    top:15px;
    left:15px;
    background:gray;
    padding:5px 12px;
    border-radius:20px;
    font-size:14px;
    font-weight:bold;
}

/* PLAY */
.play-btn{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:70px;
    height:70px;
    background:rgba(0,0,0,0.6);
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:30px;
    border:2px solid white;
}

/* MOBILE */
@media(max-width:768px){

    header{
        flex-direction:column;
        text-align:center;
    }

    .banner{
        flex-direction:column;
        text-align:center;
    }

    .match-info{
        max-width:100%;
    }
}

</style>
</head>

<body id="top">

<header>
<div class="logo">

</nav>

<a href="tel:097888381" class="btn-buy" style="background:#28a745;">
📞 Liên hệ trực tiếp

</header>

</a>

<script>

// ===== TRẬN 1 =====
updateMatch("badge1","link1",
"2026-03-28T14:30:00",
"2026-03-28T16:30:00",
"https://www.youtube.com/watch?v=RuGXo-KUFUY");

// ===== TRẬN 2 =====
updateMatch("badge2","link2",
"2026-03-28T15:30:00",
"2026-03-28T17:30:00",
"https://www.youtube.com/watch?v=RuGXo-KUFUY");

function updateMatch(badgeId, linkId, start, end, live){
    const badge = document.getElementById(badgeId);
    const link = document.getElementById(linkId);

    function update(){
        const now = new Date();

        if(now < new Date(start)){
            badge.innerHTML = "⏳ SẮP DIỄN RA";
            badge.style.background="gray";
            link.href="#";
        }
        else if(now <= new Date(end)){
            badge.innerHTML = "🔴 LIVE";
            badge.style.background="red";
            link.href=live;
        }
        else{
            badge.innerHTML = "🎬 ĐÃ KẾT THÚC";
            badge.style.background="#ff5a1f";
            link.href=live;
        }
    }

    update();
    setInterval(update,30000);
}

</script>

</html>
