<style>

/* RESET */

body{

    background:#081b2e;
    color:white;
}

/* ẢNH AUTO */
img{
    max-width:100%;
    height:auto;
    display:block;
}

/* HEADER */
header{
    position:sticky;
    top:0;
    z-index:999;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 5%;
    background:#06101b;
    flex-wrap:wrap;
    gap:10px;
}

/* LOGO */
.logo img{
    height:50px;
}

/* MENU */
nav{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    justify-content:center;
}

nav a{
    text-decoration:none;
    color:white;
    font-size:clamp(14px, 1.2vw, 18px);
}

/* BUTTON */
.btn-buy{
    background:#ff5a1f;
    padding:10px 20px;
    border-radius:25px;
}

/* BANNER */
.banner{
    display:flex;
    flex-wrap:wrap;
    align-items:center;
    justify-content:center;
    padding:40px 5%;
    gap:40px;
}

/* TEXT */
.match-info{
    max-width:500px;
}

/* TITLE */
.match-info h1{
    font-size:clamp(26px,5vw,48px);
    margin:20px 0;
}

/* BUTTON */
.btn-watch{
    display:inline-block;
    margin-top:10px;
    background:#ff5a1f;
    padding:12px 25px;
    border-radius:25px;
    text-decoration:none;
    color:white;
}

/* MOBILE */
@media(max-width:768px){

    header{
        flex-direction:column;
        text-align:center;
    }

    .banner{
        flex-direction:column;
        text-align:center;
    }

    .match-info{
        max-width:100%;
    }
}

</style>

<script>

function setupMatch(badgeId, linkId, start, end, liveLink){
    const badge = document.getElementById(badgeId);
    const link = document.getElementById(linkId);

    function update(){
        const now = new Date();

        if(now < new Date(start)){
            badge.innerHTML = "⏳ SẮP DIỄN RA";
            badge.style.background = "gray";
            link.href = "#";
        }
        else if(now <= new Date(end)){
            badge.innerHTML = "🔴 LIVE";
            badge.style.background = "red";
            link.href = liveLink;
        }
        else{
            badge.innerHTML = "🎬 ĐÃ KẾT THÚC";
            badge.style.background = "#ff5a1f";
            link.href = liveLink;
        }
    }

    update();
    setInterval(update,30000);
}
